<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corretor de Prova</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;text-align:center}
.card{background:#1e293b;padding:20px;margin:15px;border-radius:10px}
button{padding:10px;width:100%;margin-top:10px}
video,img{width:100%;max-width:400px;margin-top:10px}
</style>
</head>

<body>

<h2>📋 Corretor de Prova</h2>

<!-- GABARITO -->
<div class="card">
<h3>📄 Gabarito</h3>
<input type="file" id="foto_mestre">
<button onclick="enviarGabarito()">Ler Gabarito</button>
</div>

<!-- CAMERA -->
<div class="card">
<h3>📷 Aluno</h3>
<video id="video" autoplay playsinline></video>
<button onclick="tirarFoto()">📸 Foto</button>
<canvas id="canvas" style="display:none"></canvas>
<img id="preview">
<button onclick="enviarAluno()">Ler Aluno</button>
</div>

<!-- CALIBRAÇÃO -->
<div class="card">
<h3>⚙️ Calibração</h3>

Blur <input type="range" id="blur" min="1" max="11" step="2" value="5"><br>
Thresh Block <input type="range" id="thresh_block" min="3" max="35" step="2" value="15"><br>
Thresh C <input type="range" id="thresh_C" min="1" max="15" value="5"><br>
Fill <input type="range" id="fill_min" min="0.1" max="0.5" step="0.01" value="0.25">

</div>

<!-- RESULTADO -->
<div class="card">
<pre id="saida"></pre>
<img id="debug">
</div>

<script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>video.srcObject=stream);

// FOTO
function tirarFoto(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  document.getElementById('preview').src=canvas.toDataURL();
}

// ENVIO
async function enviar(blob){
  const fd=new FormData();

  fd.append("imagem",blob);

  fd.append("blur",document.getElementById("blur").value);
  fd.append("thresh_block",document.getElementById("thresh_block").value);
  fd.append("thresh_C",document.getElementById("thresh_C").value);
  fd.append("fill_min",document.getElementById("fill_min").value);

  const res=await fetch("/api/extrair-gabarito",{method:"POST",body:fd});
  const data=await res.json();

  document.getElementById("saida").textContent=
    JSON.stringify(data.gabarito,null,2);

  document.getElementById("debug").src=
    "data:image/jpeg;base64,"+data.debug_img;
}

// GABARITO
function enviarGabarito(){
  const f=document.getElementById("foto_mestre").files[0];
  if(!f){alert("Selecione o gabarito");return;}
  enviar(f);
}

// ALUNO
function enviarAluno(){
  const canvas=document.getElementById("canvas");
  canvas.toBlob(blob=>enviar(blob),"image/jpeg");
}
</script>

</body>
</html>
