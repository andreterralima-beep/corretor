<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Corretor Jales Machado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-respostas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
        }
        .item-questao {
            background: #334155;
            padding: 5px 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input { color: black; font-weight: bold; text-align: center; width: 30px; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-sky-400 text-center">📊 Corretor de Provas</h1>

        <div id="etapa1" class="bg-slate-800 p-6 rounded-lg mb-6">
            <h2 class="mb-4 font-semibold text-lg">1. Escanear Gabarito Oficial</h2>
            <input type="file" id="foto_gabarito" class="mb-4 block w-full text-sm">
            <button onclick="processarGabarito()" id="btn1" class="w-full bg-sky-600 p-3 rounded font-bold">Processar com OpenCV</button>
        </div>

        <div id="etapa_revisao" class="hidden bg-slate-800 p-6 rounded-lg mb-6">
            <h2 class="mb-2 font-semibold">2. Revise as Respostas</h2>
            <p class="text-xs text-slate-400 mb-4">O OpenCV detectou estas letras. Ajuste se necessário:</p>
            <div id="grade" class="grid-respostas mb-4"></div>
            <button onclick="confirmarGabarito()" class="w-full bg-green-600 p-3 rounded font-bold">Gabarito está Correto</button>
        </div>

        <div id="etapa2" class="hidden bg-slate-800 p-6 rounded-lg">
            <h2 class="mb-4 font-semibold text-lg">3. Corrigir Prova do Aluno</h2>
            <input type="text" id="nome_aluno" placeholder="Nome do Aluno" class="w-full p-2 mb-4 rounded text-black">
            <input type="file" id="foto_aluno" class="mb-4 block w-full text-sm">
            <button onclick="corrigirAluno()" id="btn2" class="w-full bg-green-600 p-3 rounded font-bold">Calcular Nota</button>
            <div id="resultado" class="mt-6 text-center text-2xl font-bold text-yellow-400"></div>
        </div>
    </div>

    <script>
        let gabaritoMemoria = {};

        async function processarGabarito() {
            const file = document.getElementById('foto_gabarito').files[0];
            if(!file) return alert("Selecione a foto!");

            document.getElementById('btn1').innerText = "Analisando Blocos...";
            const fd = new FormData();
            fd.append('imagem', file);
            fd.append('num_questoes', 50);

            const res = await fetch('/api/extrair-gabarito', { method: 'POST', body: fd });
            const data = await res.json();
            
            gabaritoMemoria = data.gabarito;
            const grade = document.getElementById('grade');
            grade.innerHTML = '';
            
            Object.keys(gabaritoMemoria).forEach(q => {
                grade.innerHTML += `
                    <div class="item-questao">
                        <span class="text-xs">Q${q}</span>
                        <input type="text" value="${gabaritoMemoria[q]}" onchange="gabaritoMemoria['${q}']=this.value.toUpperCase()">
                    </div>`;
            });
            document.getElementById('etapa_revisao').classList.remove('hidden');
        }

        function confirmarGabarito() {
            document.getElementById('etapa1').classList.add('hidden');
            document.getElementById('etapa_revisao').classList.add('hidden');
            document.getElementById('etapa2').classList.remove('hidden');
        }

        async function corrigirAluno() {
            const file = document.getElementById('foto_aluno').files[0];
            const nome = document.getElementById('nome_aluno').value;
            if(!file || !nome) return alert("Preencha tudo!");

            document.getElementById('btn2').innerText = "Corrigindo...";
            const fd = new FormData();
            fd.append('imagem', file);
            fd.append('nome_aluno', nome);
            fd.append('gabarito', JSON.stringify(gabaritoMemoria));

            const res = await fetch('/api/corrigir', { method: 'POST', body: fd });
            const data = await res.json();
            
            document.getElementById('resultado').innerHTML = `Aluno: ${data.nome_aluno}<br>Nota: ${data.nota}`;
            document.getElementById('btn2').innerText = "Calcular Nota";
        }
    </script>
</body>
</html>
