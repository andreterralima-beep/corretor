<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Corretor Jales Machado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .materia-container { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #38bdf8; }
        .grid-q { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin-top: 8px; }
        .q-card { background: #0f172a; padding: 5px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; }
        input { color: black; font-weight: bold; width: 35px; text-align: center; border-radius: 3px; margin-top: 2px; }
    </style>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-center text-sky-400 mb-6">📋 Provão Jales Machado - 2026</h1>

        <div id="p1" class="bg-slate-800 p-6 rounded-lg">
            <h2 class="mb-4">1. Foto do Gabarito Mestre</h2>
            <input type="file" id="f_gab" class="mb-4 block w-full">
            <button onclick="enviarGabarito()" id="b1" class="w-full bg-sky-600 p-3 rounded font-bold">Processar Blocos</button>
        </div>

        <div id="p_revisao" class="hidden mt-6 bg-slate-800 p-6 rounded-lg">
            <h2 class="text-yellow-400 font-bold mb-4">🔍 Revise por Matéria</h2>
            <div id="lista_materias"></div>
            <button onclick="confirmar()" class="w-full bg-green-600 p-3 rounded font-bold mt-4">Confirmar Gabarito</button>
        </div>

        <div id="p2" class="hidden mt-6 bg-slate-800 p-6 rounded-lg">
            <h2 class="text-green-400 font-bold mb-4">2. Corrigir Prova do Aluno</h2>
            <input type="text" id="aluno" placeholder="Nome do Aluno" class="w-full p-2 mb-4 rounded text-black font-bold">
            <input type="file" id="f_prova" class="mb-4 block w-full">
            <button onclick="corrigir()" id="b2" class="w-full bg-green-600 p-3 rounded font-bold">Gerar Nota</button>
            <div id="res" class="mt-6 text-center text-2xl font-bold text-sky-400"></div>
        </div>
    </div>

    <script>
        let gabaritoData = {};

        async function enviarGabarito() {
            const file = document.getElementById('f_gab').files[0];
            if(!file) return alert("Selecione a foto!");
            document.getElementById('b1').innerText = "Analisando...";

            const fd = new FormData();
            fd.append('imagem', file);

            const res = await fetch('/api/extrair-gabarito', { method: 'POST', body: fd });
            gabaritoData = (await res.json()).gabarito;
            
            const lista = document.getElementById('lista_materias');
            lista.innerHTML = '';
            
            for (const [mat, questoes] of Object.entries(gabaritoData)) {
                let html = `<div class="materia-container"><h3 class="text-xs font-black">${mat}</h3><div class="grid-q">`;
                questoes.forEach((letra, i) => {
                    html += `
                        <div class="q-card">
                            <span class="text-[9px]">Q${i+1}</span>
                            <input type="text" value="${letra}" onchange="gabaritoData['${mat}'][${i}]=this.value.toUpperCase()">
                        </div>`;
                });
                lista.innerHTML += html + `</div></div>`;
            }
            document.getElementById('p1').classList.add('hidden');
            document.getElementById('p_revisao').classList.remove('hidden');
        }

        function confirmar() {
            document.getElementById('p_revisao').classList.add('hidden');
            document.getElementById('p2').classList.remove('hidden');
        }

        async function corrigir() {
            const f = document.getElementById('f_prova').files[0];
            const n = document.getElementById('aluno').value;
            if(!f || !n) return alert("Faltam dados!");

            document.getElementById('b2').innerText = "Corrigindo...";
            const fd = new FormData();
            fd.append('imagem', f);
            fd.append('nome_aluno', n);
            fd.append('gabarito', JSON.stringify(gabaritoData));

            const res = await fetch('/api/corrigir', { method: 'POST', body: fd });
            const d = await res.json();
            document.getElementById('res').innerHTML = `Aluno: ${d.nome}<br>Nota: ${d.nota}<br><span class="text-sm">Acertos: ${d.acertos}/${d.total}</span>`;
            document.getElementById('b2').innerText = "Gerar Nota";
        }
    </script>
</body>
</html>
